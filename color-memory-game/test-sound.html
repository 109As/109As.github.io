<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音色测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .piano-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .piano-keys {
            display: flex;
            gap: 3px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .key {
            width: 60px;
            height: 200px;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.7);
            position: relative;
            user-select: none;
        }
        .key.white {
            background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
            border: 1px solid #ddd;
        }
        .key.black {
            width: 40px;
            height: 130px;
            background: linear-gradient(180deg, #333 0%, #000 100%);
            color: white;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            border-radius: 0 0 5px 5px;
        }
        .key:hover {
            transform: translateY(-3px);
        }
        .key.active {
            transform: translateY(3px);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .key.white.active {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .key.black.active {
            background: linear-gradient(180deg, #666 0%, #444 100%);
        }
        .presets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .preset-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .preset-card:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .preset-card.active {
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }
        .preset-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4facfe;
        }
        .preset-desc {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }
        .instructions {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.8);
        }
        .selected {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2) 0%, rgba(0, 242, 254, 0.2) 100%);
            border-radius: 10px;
            border: 1px solid rgba(79, 172, 254, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎹 音色测试</h1>
        
        <div class="instructions">
            <p>选择一个音色预设，然后点击钢琴键测试声音效果</p>
        </div>
        
        <div class="presets" id="presets">
            <div class="preset-card active" data-preset="bright">
                <div class="preset-name">✨ 明亮电子琴</div>
                <div class="preset-desc">清脆明亮的电子琴音色，适合流行音乐</div>
            </div>
            <div class="preset-card" data-preset="warm">
                <div class="preset-name">🎵 温暖钢琴</div>
                <div class="preset-desc">温暖柔和的钢琴音色，适合抒情曲</div>
            </div>
            <div class="preset-card" data-preset="classic">
                <div class="preset-name">🎹 经典钢琴</div>
                <div class="preset-desc">传统钢琴音色，具有丰富的泛音</div>
            </div>
            <div class="preset-card" data-preset="synth">
                <div class="preset-name">🔮 合成器</div>
                <div class="preset-desc">梦幻合成器音色，带有科幻感</div>
            </div>
            <div class="preset-card" data-preset="organ">
                <div class="preset-name">🎭 管风琴</div>
                <div class="preset-desc">管风琴音色，庄严宏大</div>
            </div>
            <div class="preset-card" data-preset="chime">
                <div class="preset-name">🔔 铃铛</div>
                <div class="preset-desc">清脆的铃铛音色，适合点缀</div>
            </div>
        </div>
        
        <div class="piano-container">
            <div class="piano-keys" id="piano-keys">
                <button class="key white" data-note="C4">C</button>
                <button class="key black" data-note="C#4">C#</button>
                <button class="key white" data-note="D4">D</button>
                <button class="key black" data-note="D#4">D#</button>
                <button class="key white" data-note="E4">E</button>
                <button class="key white" data-note="F4">F</button>
                <button class="key black" data-note="F#4">F#</button>
                <button class="key white" data-note="G4">G</button>
                <button class="key black" data-note="G#4">G#</button>
                <button class="key white" data-note="A4">A</button>
                <button class="key black" data-note="A#4">A#</button>
                <button class="key white" data-note="B4">B</button>
                <button class="key white" data-note="C5">C</button>
            </div>
        </div>
        
        <div class="selected" id="selected">
            当前选择: <span style="color:#4facfe">明亮电子琴</span>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const noteFrequencies = {
            'C4': 261.63,
            'C#4': 277.18,
            'D4': 293.66,
            'D#4': 311.13,
            'E4': 329.63,
            'F4': 349.23,
            'F#4': 369.99,
            'G4': 392.00,
            'G#4': 415.30,
            'A4': 440.00,
            'A#4': 466.16,
            'B4': 493.88,
            'C5': 523.25
        };
        
        let currentPreset = 'bright';
        const pressedKeys = {};
        
        // 音色预设
        const presets = {
            bright: {
                name: '明亮电子琴',
                play: (freq, duration) => {
                    const now = audioContext.currentTime;
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const osc3 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    const gain3 = audioContext.createGain();
                    const masterGain = audioContext.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(freq * 2, now);
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(freq * 4, now);
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    osc3.connect(gain3);
                    gain1.connect(masterGain);
                    gain2.connect(masterGain);
                    gain3.connect(masterGain);
                    masterGain.connect(audioContext.destination);
                    
                    const attack = 0.005;
                    const decay = 0.1;
                    const sustain = 0.2;
                    const release = duration / 1000 - attack - decay;
                    
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.4, now + attack);
                    gain1.gain.linearRampToValueAtTime(sustain, now + attack + decay);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain2.gain.setValueAtTime(0, now);
                    gain2.gain.linearRampToValueAtTime(0.15, now + attack);
                    gain2.gain.linearRampToValueAtTime(sustain * 0.5, now + attack + decay);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain3.gain.setValueAtTime(0, now);
                    gain3.gain.linearRampToValueAtTime(0.05, now + attack);
                    gain3.gain.linearRampToValueAtTime(sustain * 0.3, now + attack + decay);
                    gain3.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.4, now + attack);
                    masterGain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc3.start(now);
                    osc1.stop(now + duration / 1000);
                    osc2.stop(now + duration / 1000);
                    osc3.stop(now + duration / 1000);
                }
            },
            warm: {
                name: '温暖钢琴',
                play: (freq, duration) => {
                    const now = audioContext.currentTime;
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const osc3 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    const gain3 = audioContext.createGain();
                    const filter = audioContext.createBiquadFilter();
                    const masterGain = audioContext.createGain();
                    
                    osc1.type = 'triangle';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * 1.5, now);
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(freq * 2.5, now);
                    
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(4000, now);
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    osc3.connect(gain3);
                    gain1.connect(filter);
                    gain2.connect(filter);
                    gain3.connect(filter);
                    filter.connect(masterGain);
                    masterGain.connect(audioContext.destination);
                    
                    const attack = 0.02;
                    const decay = 0.2;
                    const sustain = 0.15;
                    const release = duration / 1000 - attack - decay;
                    
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.35, now + attack);
                    gain1.gain.linearRampToValueAtTime(sustain, now + attack + decay);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain2.gain.setValueAtTime(0, now);
                    gain2.gain.linearRampToValueAtTime(0.1, now + attack);
                    gain2.gain.linearRampToValueAtTime(sustain * 0.5, now + attack + decay);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain3.gain.setValueAtTime(0, now);
                    gain3.gain.linearRampToValueAtTime(0.05, now + attack);
                    gain3.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.35, now + attack);
                    masterGain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc3.start(now);
                    osc1.stop(now + duration / 1000);
                    osc2.stop(now + duration / 1000);
                    osc3.stop(now + duration / 1000);
                }
            },
            classic: {
                name: '经典钢琴',
                play: (freq, duration) => {
                    const now = audioContext.currentTime;
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const osc3 = audioContext.createOscillator();
                    const osc4 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    const gain3 = audioContext.createGain();
                    const gain4 = audioContext.createGain();
                    const masterGain = audioContext.createGain();
                    
                    osc1.type = 'triangle';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * 2, now);
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(freq * 3, now);
                    osc4.type = 'sine';
                    osc4.frequency.setValueAtTime(freq * 4, now);
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    osc3.connect(gain3);
                    osc4.connect(gain4);
                    gain1.connect(masterGain);
                    gain2.connect(masterGain);
                    gain3.connect(masterGain);
                    gain4.connect(masterGain);
                    masterGain.connect(audioContext.destination);
                    
                    const attack = 0.01;
                    const decay = 0.15;
                    const sustain = 0.12;
                    const release = duration / 1000 - attack - decay;
                    
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.4, now + attack);
                    gain1.gain.linearRampToValueAtTime(sustain, now + attack + decay);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain2.gain.setValueAtTime(0, now);
                    gain2.gain.linearRampToValueAtTime(0.12, now + attack);
                    gain2.gain.linearRampToValueAtTime(sustain * 0.6, now + attack + decay);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain3.gain.setValueAtTime(0, now);
                    gain3.gain.linearRampToValueAtTime(0.06, now + attack);
                    gain3.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain4.gain.setValueAtTime(0, now);
                    gain4.gain.linearRampToValueAtTime(0.03, now + attack);
                    gain4.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.4, now + attack);
                    masterGain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc3.start(now);
                    osc4.start(now);
                    osc1.stop(now + duration / 1000);
                    osc2.stop(now + duration / 1000);
                    osc3.stop(now + duration / 1000);
                    osc4.stop(now + duration / 1000);
                }
            },
            synth: {
                name: '合成器',
                play: (freq, duration) => {
                    const now = audioContext.currentTime;
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const filter = audioContext.createBiquadFilter();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    const masterGain = audioContext.createGain();
                    
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(freq * 1.01, now);
                    
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(2000, now);
                    filter.frequency.linearRampToValueAtTime(500, now + duration / 1000);
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    gain1.connect(filter);
                    gain2.connect(filter);
                    filter.connect(masterGain);
                    masterGain.connect(audioContext.destination);
                    
                    const attack = 0.05;
                    const decay = 0.2;
                    const sustain = 0.18;
                    const release = duration / 1000 - attack - decay;
                    
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.3, now + attack);
                    gain1.gain.linearRampToValueAtTime(sustain, now + attack + decay);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain2.gain.setValueAtTime(0, now);
                    gain2.gain.linearRampToValueAtTime(0.15, now + attack);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.35, now + attack);
                    masterGain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + duration / 1000);
                    osc2.stop(now + duration / 1000);
                }
            },
            organ: {
                name: '管风琴',
                play: (freq, duration) => {
                    const now = audioContext.currentTime;
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const osc3 = audioContext.createOscillator();
                    const osc4 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    const gain3 = audioContext.createGain();
                    const gain4 = audioContext.createGain();
                    const masterGain = audioContext.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * 2, now);
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(freq * 3, now);
                    osc4.type = 'sine';
                    osc4.frequency.setValueAtTime(freq * 4, now);
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    osc3.connect(gain3);
                    osc4.connect(gain4);
                    gain1.connect(masterGain);
                    gain2.connect(masterGain);
                    gain3.connect(masterGain);
                    gain4.connect(masterGain);
                    masterGain.connect(audioContext.destination);
                    
                    const attack = 0.1;
                    const decay = 0.1;
                    const sustain = 0.4;
                    const release = duration / 1000 - attack - decay;
                    
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.3, now + attack);
                    gain1.gain.linearRampToValueAtTime(sustain, now + attack + decay);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain2.gain.setValueAtTime(0, now);
                    gain2.gain.linearRampToValueAtTime(0.2, now + attack);
                    gain2.gain.linearRampToValueAtTime(sustain * 0.8, now + attack + decay);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain3.gain.setValueAtTime(0, now);
                    gain3.gain.linearRampToValueAtTime(0.15, now + attack);
                    gain3.gain.linearRampToValueAtTime(sustain * 0.6, now + attack + decay);
                    gain3.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain4.gain.setValueAtTime(0, now);
                    gain4.gain.linearRampToValueAtTime(0.1, now + attack);
                    gain4.gain.linearRampToValueAtTime(sustain * 0.4, now + attack + decay);
                    gain4.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.4, now + attack);
                    masterGain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc3.start(now);
                    osc4.start(now);
                    osc1.stop(now + duration / 1000);
                    osc2.stop(now + duration / 1000);
                    osc3.stop(now + duration / 1000);
                    osc4.stop(now + duration / 1000);
                }
            },
            chime: {
                name: '铃铛',
                play: (freq, duration) => {
                    const now = audioContext.currentTime;
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const osc3 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    const gain3 = audioContext.createGain();
                    const filter = audioContext.createBiquadFilter();
                    const masterGain = audioContext.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * 2, now);
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(freq * 3, now);
                    
                    filter.type = 'highpass';
                    filter.frequency.setValueAtTime(1000, now);
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    osc3.connect(gain3);
                    gain1.connect(filter);
                    gain2.connect(filter);
                    gain3.connect(filter);
                    filter.connect(masterGain);
                    masterGain.connect(audioContext.destination);
                    
                    const attack = 0.002;
                    const decay = 0.3;
                    const release = duration / 1000 - attack - decay;
                    
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.35, now + attack);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain2.gain.setValueAtTime(0, now);
                    gain2.gain.linearRampToValueAtTime(0.2, now + attack);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    gain3.gain.setValueAtTime(0, now);
                    gain3.gain.linearRampToValueAtTime(0.1, now + attack);
                    gain3.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.4, now + attack);
                    masterGain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc3.start(now);
                    osc1.stop(now + duration / 1000);
                    osc2.stop(now + duration / 1000);
                    osc3.stop(now + duration / 1000);
                }
            }
        };
        
        function playSound(note) {
            const freq = noteFrequencies[note];
            if (!freq) return;
            
            presets[currentPreset].play(freq, 400);
        }
        
        // 事件监听
        const pianoKeys = document.querySelectorAll('.key');
        pianoKeys.forEach(key => {
            key.addEventListener('mousedown', () => {
                const note = key.dataset.note;
                if (pressedKeys[note]) return;
                pressedKeys[note] = true;
                key.classList.add('active');
                playSound(note);
            });
            
            key.addEventListener('mouseup', () => {
                const note = key.dataset.note;
                pressedKeys[note] = false;
                key.classList.remove('active');
            });
            
            key.addEventListener('mouseleave', () => {
                const note = key.dataset.note;
                pressedKeys[note] = false;
                key.classList.remove('active');
            });
        });
        
        // 音色选择
        const presetCards = document.querySelectorAll('.preset-card');
        presetCards.forEach(card => {
            card.addEventListener('click', () => {
                presetCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentPreset = card.dataset.preset;
                document.getElementById('selected').innerHTML = 
                    `当前选择: <span style="color:#4facfe">${presets[currentPreset].name}</span>`;
            });
        });
    </script>
</body>
</html>
