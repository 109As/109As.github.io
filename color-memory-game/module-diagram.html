<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢琴学习游戏 - 功能模块图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: linear-gradient(180deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            padding: 30px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .module-box {
            background: white;
            border: 2px solid #1a73e8;
            border-radius: 6px;
            padding: 12px 30px;
            text-align: center;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            min-width: 280px;
        }
        
        .main-module {
            background: linear-gradient(145deg, #1a73e8, #1557b0);
            color: white;
            border-color: #1557b0;
            font-size: 18px;
            font-weight: bold;
            min-width: 320px;
            padding: 15px 40px;
        }
        
        .line-horizontal {
            width: 20px;
            height: 2px;
            background: #666;
        }
        
        .line-vertical {
            width: 2px;
            height: 25px;
            background: #666;
        }
        
        .line-vertical-short {
            width: 2px;
            height: 15px;
            background: #666;
        }
        
        .second-level {
            display: flex;
            align-items: flex-start;
            gap: 40px;
        }
        
        .second-box {
            border-color: #4285f4;
            min-width: 160px;
            padding: 10px 20px;
            font-weight: bold;
        }
        
        .third-level {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .third-box {
            background: #f8f9fa;
            border-color: #9e9e9e;
            min-width: 120px;
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .connector {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .connector-main {
            display: flex;
            align-items: center;
        }
        
        .connector-second {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .branch-line {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .branch-line::before {
            content: '';
            width: 20px;
            height: 2px;
            background: #666;
        }
        
        .branch-line::after {
            content: '';
            width: 20px;
            height: 2px;
            background: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>钢琴学习游戏 - 功能模块图</h1>
        
        <div class="diagram">
            <!-- 主模块 -->
            <div class="module-box main-module">
                钢琴学习游戏
            </div>
            
            <!-- 主连接线 -->
            <div class="connector-main">
                <div class="line-horizontal"></div>
                <div class="line-vertical"></div>
                <div class="line-horizontal"></div>
            </div>
            
            <!-- 第二级模块 -->
            <div class="second-level">
                <!-- 游戏模式 -->
                <div class="connector-second">
                    <div class="module-box second-box">游戏模式</div>
                    <div class="line-vertical-short"></div>
                    <div class="third-level">
                        <div class="module-box third-box">记忆挑战</div>
                        <div class="module-box third-box">纯听模式</div>
                        <div class="module-box third-box">编辑关卡</div>
                        <div class="module-box third-box">练习模式</div>
                        <div class="module-box third-box">高级编辑</div>
                    </div>
                </div>
                
                <!-- 高级编辑器 -->
                <div class="connector-second">
                    <div class="module-box second-box">高级编辑器</div>
                    <div class="line-vertical-short"></div>
                    <div class="third-level">
                        <div class="module-box third-box">时间轴编辑</div>
                        <div class="module-box third-box">节点管理</div>
                        <div class="module-box third-box">音符编辑</div>
                        <div class="module-box third-box">播放控制</div>
                        <div class="module-box third-box">保存加载</div>
                    </div>
                </div>
                
                <!-- 音频处理 -->
                <div class="connector-second">
                    <div class="module-box second-box">音频处理</div>
                    <div class="line-vertical-short"></div>
                    <div class="third-level">
                        <div class="module-box third-box">Web Audio API</div>
                        <div class="module-box third-box">音色引擎</div>
                        <div class="module-box third-box">延音踏板</div>
                        <div class="module-box third-box">混响效果</div>
                    </div>
                </div>
                
                <!-- 用户管理 -->
                <div class="connector-second">
                    <div class="module-box second-box">用户管理</div>
                    <div class="line-vertical-short"></div>
                    <div class="third-level">
                        <div class="module-box third-box">用户登录</div>
                        <div class="module-box third-box">关卡保存</div>
                        <div class="module-box third-box">进度管理</div>
                        <div class="module-box third-box">数据同步</div>
                    </div>
                </div>
                
                <!-- 后端服务 -->
                <div class="connector-second">
                    <div class="module-box second-box">后端服务</div>
                    <div class="line-vertical-short"></div>
                    <div class="third-level">
                        <div class="module-box third-box">数据持久化</div>
                        <div class="module-box third-box">API接口</div>
                        <div class="module-box third-box">用户认证</div>
                        <div class="module-box third-box">数据存储</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
